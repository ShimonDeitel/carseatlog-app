name: Car Seat Safety Log
options:
  bundleIdPrefix: com.shimondeitel.carseatlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Car Seat Safety Log:
    type: application
    platform: iOS
    sources:
      - path: Car Seat Safety Log
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.carseatlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Car Seat Safety Log/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  Car Seat Safety LogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Car Seat Safety LogTests
      - path: Car Seat Safety Log.storekit
    dependencies:
      - target: Car Seat Safety Log
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.carseatlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  Car Seat Safety LogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Car Seat Safety LogUITests
    dependencies:
      - target: Car Seat Safety Log
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.carseatlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Car Seat Safety Log:
    build:
      targets:
        Car Seat Safety Log: all
        Car Seat Safety LogTests: [test]
        Car Seat Safety LogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Car Seat Safety Log.storekit
    test:
      config: Debug
      storeKitConfiguration: Car Seat Safety Log.storekit
      targets:
        - Car Seat Safety LogTests
        - Car Seat Safety LogUITests
    archive:
      config: Release
